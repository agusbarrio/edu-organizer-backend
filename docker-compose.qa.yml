services:
  backend:
    image: edu-organizer-backend-qa
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: qa
    env_file:
      - .env.qa
    volumes:
      - edu_organizer_qa_uploads_new:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  edu_organizer_qa_uploads_new:
